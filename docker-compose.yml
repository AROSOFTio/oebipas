services:
  db:
    image: mysql:8.0
    container_name: oebipas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: oebipas
      MYSQL_USER: oebipas_user
      MYSQL_PASSWORD: secretpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - oebipas_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: oebipas_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8084:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oebipas_network

  backend:
    build:
      context: ./backend
    container_name: oebipas_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DB_HOST=db
      - DB_USER=oebipas_user
      - DB_PASSWORD=secretpassword
      - DB_NAME=oebipas
      - JWT_SECRET=supersecretjwtkey2026
      - JWT_EXPIRES_IN=24h
    depends_on:
      db:
        condition: service_healthy
    networks:
      - oebipas_network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: oebipas_frontend
    restart: unless-stopped
    networks:
      - oebipas_network

  nginx:
    image: nginx:alpine
    container_name: oebipas_nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - oebipas_network

volumes:
  db_data:
    driver: local

networks:
  oebipas_network:
    driver: bridge
