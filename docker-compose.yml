version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: oebipas_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: oebipas
      MYSQL_USER: oebipas_user
      MYSQL_PASSWORD: secretpassword
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3306:3306"
    networks:
      - oebipas_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: oebipas_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: rootpassword
    ports:
      - "8080:80"
    depends_on:
      - db
    networks:
      - oebipas_network

  backend:
    build: 
      context: ./backend
    container_name: oebipas_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_HOST=db
      - DB_USER=oebipas_user
      - DB_PASSWORD=secretpassword
      - DB_NAME=oebipas
      - JWT_SECRET=supersecretjwtkey2026
    depends_on:
      - db
    networks:
      - oebipas_network

  frontend:
    build:
      context: ./frontend
    container_name: oebipas_frontend
    restart: unless-stopped
    # In a prod setup, this is an Nginx container serving static files on port 80.
    # The reverse proxy will sit in front of it.
    networks:
      - oebipas_network

  nginx:
    image: nginx:alpine
    container_name: oebipas_nginx
    restart: unless-stopped
    ports:
      - "8083:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - oebipas_network

volumes:
  db_data:

networks:
  oebipas_network:
    driver: bridge
